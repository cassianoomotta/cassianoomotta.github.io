<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fundo branco com bordas arredondadas -->
  <rect width="64" height="64" rx="14" fill="#f5f7fb"/>

  <!-- Círculos concêntricos do radar -->
  <circle cx="32" cy="32" r="26" stroke="#d1d9f0" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="18" stroke="#b8c3e8" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="10" stroke="#9aaada" stroke-width="1.5"/>

  <!-- Linhas de grade (horizontal e vertical) -->
  <line x1="6" y1="32" x2="58" y2="32" stroke="#d1d9f0" stroke-width="1"/>
  <line x1="32" y1="6" x2="32" y2="58" stroke="#d1d9f0" stroke-width="1"/>

  <!-- Sweep do radar (fatia azul) -->
  <path d="M32 32 L52 20 A26 26 0 0 1 58 32 Z" fill="#3b5bdb" opacity="0.15"/>

  <!-- Linha do sweep -->
  <line x1="32" y1="32" x2="55" y2="19" stroke="#3b5bdb" stroke-width="2" stroke-linecap="round"/>

  <!-- Ponto central -->
  <circle cx="32" cy="32" r="3" fill="#111827"/>

  <!-- Ponto ativo no sweep -->
  <circle cx="50" cy="24" r="2.5" fill="#3b5bdb"/>
  <!-- Anel de pulso ao redor do ponto -->
  <circle cx="50" cy="24" r="4.5" stroke="#3b5bdb" stroke-width="1" opacity="0.4"/>
</svg>
